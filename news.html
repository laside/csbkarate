<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualités | CSB Karaté</title>
    
    <link rel="stylesheet" href="./assets/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./assets/js/tailwind.js"></script>
    <script src="./assets/js/main.js" defer></script>
    <!-- On ajoute le script de récupération du JSON -->
    <script src="./assets/js/news.js" defer></script>
</head>
<body class="bg-csb-washi text-csb-encre font-sans antialiased min-h-screen flex flex-col">
    
    <div id="header-placeholder"></div>

    <main class="flex-grow pt-32 pb-20">
        <div class="max-w-7xl mx-auto px-6">
            <div class="text-center mb-16">
                <span class="font-condensed text-csb-corail uppercase tracking-widest text-sm mb-4 block">La vie du club</span>
                <h1 class="font-serif text-5xl md:text-6xl text-csb-encre mb-6">Actualités & News</h1>
                <p class="text-xl text-gray-500 max-w-2xl mx-auto font-sans">Restez informé des événements du club, des passages de grades et des informations importantes.</p>
            </div>

            <!-- Le conteneur vide qui va recevoir les news du JSON -->
            <div class="bento-grid" id="news-grid">
                <!-- Injecté par assets/js/news.js -->
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
</body>
</html>
